version: '3.8'

services:
  app:
    image: yuujin-server:latest
    container_name: yuujin-app
    restart: unless-stopped
    ports:
      - '7001:7001'
    environment:
      - NODE_ENV=production
      - EGG_SERVER_ENV=prod
      - EGG_KEYS=${EGG_KEYS}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-yuujin}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-yuujin}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - AI_PROVIDER=${AI_PROVIDER:-ernie}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      - QIANWEN_API_KEY=${QIANWEN_API_KEY:-}
      - QIANWEN_MODEL=${QIANWEN_MODEL:-qwen-plus}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - ERNIE_API_KEY=${ERNIE_API_KEY:-}
      - ERNIE_MODEL=${ERNIE_MODEL:-ernie-speed}
      - PRODUCT_AI_PROVIDER=${PRODUCT_AI_PROVIDER:-qianwen}
      - PRODUCT_QIANWEN_MODEL=${PRODUCT_QIANWEN_MODEL:-qwen3.5-plus}
      - OSS_BUCKET=${OSS_BUCKET:-yuujin-assets}
      - OSS_REGION=${OSS_REGION:-oss-cn-hangzhou}
      - OSS_CDN_DOMAIN=${OSS_CDN_DOMAIN:-}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - yuujin-net

  mysql:
    image: mysql:8.0
    container_name: yuujin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yuujin}
      MYSQL_USER: ${MYSQL_USER:-yuujin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '127.0.0.1:3306:3306'  # Only bind to localhost, not public
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yuujin-net

  redis:
    image: redis:7-alpine
    container_name: yuujin-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'  # Only bind to localhost
    volumes:
      - redis_data:/data
    networks:
      - yuujin-net

  nginx:
    image: nginx:alpine
    container_name: yuujin-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web:/usr/share/nginx/html
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - app
    networks:
      - yuujin-net
    # 每 6 小时自动 reload，让 certbot 续签的证书生效
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: yuujin-certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # 每 12 小时检查续签
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  mysql_data:
  redis_data:
  certbot_conf:
  certbot_www:

networks:
  yuujin-net:
    driver: bridge
